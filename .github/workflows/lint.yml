name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck on install.sh
        run: shellcheck install.sh

  install-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run install.sh against a temp HOME
        run: |
          set -euo pipefail
          export HOME="$(mktemp -d)"
          bash install.sh
          test -f "$HOME/.claude/skills/monday-architect/SKILL.md"
          test -f "$HOME/.claude/skills/refresh-monday-skill/SKILL.md"
          # Confirm version line exists
          grep -E '^version:' "$HOME/.claude/skills/monday-architect/SKILL.md"
          echo "✓ Install smoke test passed"
